<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Alma Industria Creativa</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="logo.png" alt="Alma Logo" class="logo">
            <h2>Acceso al Sistema</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@alma.com" required>
                </div>
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('http://127.0.0.1:3000/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (data.status === "success") {
                localStorage.setItem('usuarioNombre', data.nombre);

                // Ventana elegante que querías (estilo oscuro para Alma Quinta)
                Swal.fire({
                    title: `¡Bienvenido, ${data.nombre}!`,
                    text: 'Accediendo al Panel de Control de Alma Quinta',
                    icon: 'success',
                    background: '#1a2421', // Verde oscuro de fondo
                    color: '#ffffff',       // Texto blanco
                    confirmButtonColor: '#b38e5d', // Dorado del botón
                    confirmButtonText: 'Entrar'
                }).then((result) => {
                    window.location.href = "dashboard.html";
                });

            } else {
                Swal.fire({
                    title: 'Error',
                    text: 'Usuario o contraseña incorrectos',
                    icon: 'error',
                    confirmButtonColor: '#7066e0'
                });
            }
        } catch (error) {
            Swal.fire({
                title: 'Error de servidor',
                text: 'Asegúrate de que el servidor.js esté corriendo',
                icon: 'error',
                confirmButtonColor: '#7066e0'
            });
        }
    });
    </script>
</body>
</html>
